name: VSO Project Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run project monitor
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python check_projects.py

      - name: Commit updated state
        run: |
          git config user.name  "VSO Monitor Bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add last_known_projects.json
          git diff --staged --quiet || git commit -m "chore: update known projects [skip ci]"
          git push
